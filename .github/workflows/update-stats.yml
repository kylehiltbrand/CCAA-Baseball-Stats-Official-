name: Update CCAA Baseball Stats

on:
  schedule:
    - cron: '0 14 * * *'
  push:
    branches: [ main ]
    paths:
      - 'scraper/**'
      - '.github/workflows/update-stats.yml'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browser
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Run stats scraper
        working-directory: scraper
        run: node scrape-teams.js
        env:
          NODE_ENV: production

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet ccaa-baseball.html scraper/last-scrape.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated stats
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "CCAA Stats Bot"
          git config user.email "stats-bot@ccaa-baseball.noreply"
          git add ccaa-baseball.html scraper/last-scrape.json
          git commit -m "Auto-update stats $(TZ='America/Los_Angeles' date '+%b %d, %Y')"
          git push
